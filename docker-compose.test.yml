name: agent-loop-test

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agentloop
    ports:
      - "45432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentloop"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pg-data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "41434:11434"
    environment:
      OLLAMA_KEEP_ALIVE: 5m
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 30
    volumes:
      - ollama-data:/root/.ollama

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:latest}
    entrypoint:
      - /bin/sh
      - -c
      - 'echo "pulling $${OLLAMA_MODEL} for REST integration tests" && ollama pull "$${OLLAMA_MODEL}"'

  api:
    build:
      context: .
      target: app
    command: ["-addr", ":8080"]
    environment:
      AGENT_LOOP_PG_DSN: postgres://postgres:postgres@postgres:5432/agentloop?sslmode=disable
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:latest}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-900}
    ports:
      - "48080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz | grep -q ok"]
      interval: 5s
      timeout: 5s
      retries: 30

  rest-test:
    build:
      context: .
      target: test
    environment:
      AGENT_LOOP_REST_URL: http://api:8080
      AGENT_LOOP_REST_TIMEOUT: ${AGENT_LOOP_REST_TIMEOUT:-900}
    depends_on:
      api:
        condition: service_healthy
    command: ["go", "test", "-tags=rest", "-count=1", "./api"]

volumes:
  pg-data:
  ollama-data:
